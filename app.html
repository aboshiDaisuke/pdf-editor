<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Editor</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --pri: #6366f1; --pri-h: #4f46e5; --pri-l: #eef2ff;
  --bg: #f1f5f9; --surface: #ffffff; --surface-h: #f8fafc;
  --border: #e2e8f0; --border-s: #cbd5e1;
  --txt: #0f172a; --txt2: #475569; --txt3: #94a3b8;
  --red: #ef4444; --green: #22c55e; --amber: #f59e0b;
  --radius: 8px; --radius-lg: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,.06), 0 2px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.1), 0 4px 10px rgba(0,0,0,.04);
  --shadow-xl: 0 20px 50px rgba(0,0,0,.15);
  --tr: 150ms ease;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", "Hiragino Sans", sans-serif;
  background: var(--bg); color: var(--txt);
  height: 100vh; overflow: hidden; font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

/* ===== Header ===== */
.header {
  height: 52px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px; gap: 2px;
  box-shadow: var(--shadow);
  position: relative; z-index: 100;
}
.logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 15px; font-weight: 700; letter-spacing: -0.3px;
  padding-right: 12px; color: var(--txt);
  user-select: none;
}
.logo-icon { width: 22px; height: 22px; color: var(--pri); }
.sep { width: 1px; height: 28px; background: var(--border); margin: 0 8px; flex-shrink: 0; }

.toolbar-group { display: flex; align-items: center; gap: 2px; }

.tbtn {
  height: 34px; padding: 0 12px;
  border: 1px solid transparent; border-radius: 7px;
  background: transparent; color: var(--txt2);
  font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all var(--tr);
  display: inline-flex; align-items: center; gap: 5px;
  white-space: nowrap; user-select: none;
}
.tbtn:hover { background: var(--bg); color: var(--txt); }
.tbtn:active { transform: scale(0.97); }
.tbtn.active { background: var(--pri-l); color: var(--pri); border-color: rgba(99,102,241,.2); }
.tbtn:disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }
.tbtn svg { width: 16px; height: 16px; flex-shrink: 0; }
.tbtn-primary {
  background: var(--pri); color: #fff; border-color: var(--pri);
  font-weight: 600;
}
.tbtn-primary:hover { background: var(--pri-h); }

.zoom-display {
  font-size: 11px; font-weight: 700; color: var(--txt3);
  min-width: 44px; text-align: center; user-select: none;
}

.spacer { flex: 1; }

/* ===== Layout ===== */
.main-layout { display: flex; height: calc(100vh - 52px); }

/* ===== Sidebar ===== */
.sidebar {
  width: 210px; background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0;
}
.sidebar-head {
  padding: 14px 14px 10px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.sidebar-head h2 {
  font-size: 11px; font-weight: 700; color: var(--txt3);
  text-transform: uppercase; letter-spacing: .6px;
}
.sidebar-actions { display: flex; gap: 4px; }
.sb-icon-btn {
  width: 28px; height: 28px;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--tr); color: var(--txt3);
}
.sb-icon-btn svg { width: 14px; height: 14px; }
.sb-icon-btn:hover { background: var(--bg); border-color: var(--border-s); color: var(--txt2); }
.sb-icon-btn.danger:hover { background: #fef2f2; border-color: #fecaca; color: var(--red); }

.page-list {
  flex: 1; overflow-y: auto; padding: 8px;
  display: flex; flex-direction: column; gap: 4px;
}
.page-list::-webkit-scrollbar { width: 4px; }
.page-list::-webkit-scrollbar-thumb { background: var(--border-s); border-radius: 2px; }

.page-item {
  padding: 8px; border-radius: var(--radius);
  cursor: grab; font-size: 11px; font-weight: 600; color: var(--txt3);
  transition: transform .2s ease, box-shadow .2s ease, background .15s ease, border-color .15s ease;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  position: relative;
  border: 2px solid transparent;
}
.page-item:hover { background: var(--surface-h); border-color: var(--border); }
.page-item.active {
  border-color: var(--pri); background: var(--pri-l); color: var(--pri);
  box-shadow: 0 2px 8px rgba(99,102,241,.15);
}
.page-item.dragging {
  opacity: 0.3; transform: scale(0.95);
}
.page-item.drag-over-top { border-top: 3px solid var(--pri); border-radius: 3px 3px var(--radius) var(--radius); }
.page-item.drag-over-bottom { border-bottom: 3px solid var(--pri); border-radius: var(--radius) var(--radius) 3px 3px; }
.page-item .page-thumb {
  width: 100%; aspect-ratio: 210 / 297;
  object-fit: contain; border-radius: 4px;
  background: #fff; display: block;
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
  pointer-events: none;
}
.page-item .page-label { text-align: center; pointer-events: none; }
.page-item .page-check {
  position: absolute; top: 6px; left: 6px;
  width: 18px; height: 18px; border-radius: 4px;
  border: 2px solid var(--border-s); background: var(--surface);
  cursor: pointer; display: none; z-index: 2;
  appearance: none; -webkit-appearance: none; margin: 0;
  transition: all var(--tr);
}
.page-item .page-check:checked {
  background: var(--pri); border-color: var(--pri);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2.5-2.5a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3E%3C/svg%3E");
  background-size: 14px; background-position: center; background-repeat: no-repeat;
}
.sidebar.select-mode .page-item .page-check { display: block; }
.sidebar.select-mode .page-item { padding-left: 28px; }
.page-item.selected { background: var(--pri-l); border-color: rgba(99,102,241,.3); }

.sidebar-footer {
  padding: 10px 8px; border-top: 1px solid var(--border);
  display: flex; gap: 4px;
}
.sidebar-footer button {
  flex: 1; height: 30px;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface); cursor: pointer;
  font-size: 11px; font-weight: 500; color: var(--txt2);
  transition: all var(--tr);
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.sidebar-footer button:hover { background: var(--bg); border-color: var(--border-s); }
.sidebar-footer button svg { width: 12px; height: 12px; }

/* ===== Editor Area ===== */
.editor-area {
  flex: 1; overflow: auto; background: var(--bg);
  display: flex; align-items: flex-start; justify-content: center;
  position: relative;
}
.editor-area.drag-over::after {
  content: ''; position: absolute; inset: 16px;
  border: 3px dashed var(--pri); border-radius: 16px;
  background: rgba(99,102,241,.04);
  pointer-events: none; z-index: 50;
}

/* Empty state */
.empty-state {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 6px;
  user-select: none;
}
.empty-state svg {
  width: 72px; height: 72px; color: var(--txt3); opacity: .3;
  margin-bottom: 12px;
}
.empty-state h2 { font-size: 18px; font-weight: 700; color: var(--txt2); }
.empty-state p { font-size: 13px; color: var(--txt3); margin-bottom: 20px; }
.btn-open {
  padding: 12px 32px; background: var(--pri); color: #fff;
  border: none; border-radius: var(--radius); font-size: 14px;
  font-weight: 600; cursor: pointer; transition: all var(--tr);
  box-shadow: 0 2px 8px rgba(99,102,241,.3);
}
.btn-open:hover { background: var(--pri-h); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,.4); }
.btn-open:active { transform: translateY(0); }

/* Page display */
.page-display { padding: 32px; flex-shrink: 0; }
.page-canvas {
  box-shadow: var(--shadow-lg); border-radius: 3px;
  cursor: crosshair; display: block; background: #fff;
  transition: box-shadow var(--tr);
}
.page-canvas:hover { box-shadow: var(--shadow-xl); }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,.4); backdrop-filter: blur(4px);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  animation: fadeIn .15s ease-out;
}
.modal {
  background: var(--surface); border-radius: 16px;
  width: 620px; max-width: calc(100vw - 40px);
  max-height: 80vh; display: flex; flex-direction: column;
  box-shadow: var(--shadow-xl);
  animation: modalIn .2s ease-out;
}
@keyframes fadeIn { from { opacity: 0; } }
@keyframes modalIn { from { opacity: 0; transform: scale(.96) translateY(8px); } }

.modal-header {
  padding: 24px 28px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-header h2 { font-size: 18px; font-weight: 700; }
.modal-close {
  width: 32px; height: 32px; border: none; border-radius: 8px;
  background: var(--bg); cursor: pointer; font-size: 18px;
  color: var(--txt3); transition: all var(--tr);
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: var(--border); color: var(--txt); }

.modal-subtitle { padding: 0 28px 16px; font-size: 12px; color: var(--txt3); }

.modal-body { flex: 1; overflow-y: auto; padding: 0 28px 20px; }

.text-row {
  display: flex; align-items: center;
  padding: 10px 14px; background: var(--bg);
  border-radius: var(--radius); margin-bottom: 6px;
  gap: 10px; transition: all var(--tr);
  border: 1px solid transparent;
}
.text-row:hover { background: var(--pri-l); border-color: rgba(99,102,241,.15); }
.text-content {
  flex: 1; font-size: 13px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
  color: var(--txt);
}
.text-meta {
  font-size: 10px; color: var(--txt3); font-weight: 600;
  padding: 2px 6px; background: var(--surface); border-radius: 4px;
  white-space: nowrap;
}
.text-edit-btn {
  padding: 6px 16px; border: none; border-radius: 6px;
  background: var(--pri); color: #fff;
  font-size: 11px; font-weight: 600; cursor: pointer;
  transition: all var(--tr); white-space: nowrap;
}
.text-edit-btn:hover { background: var(--pri-h); }

.modal-footer {
  padding: 16px 28px 24px; text-align: right;
  border-top: 1px solid var(--border);
}
.modal-footer button {
  padding: 8px 22px; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--surface);
  cursor: pointer; font-size: 12px; font-weight: 500; color: var(--txt2);
  transition: all var(--tr);
}
.modal-footer button:hover { background: var(--bg); }

/* ===== Input Dialog ===== */
.dialog-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,.35); backdrop-filter: blur(3px);
  z-index: 600; display: flex; align-items: center; justify-content: center;
  animation: fadeIn .12s ease-out;
}
.dialog {
  background: #fff; border-radius: 14px; padding: 28px;
  width: 440px; max-width: calc(100vw - 40px);
  box-shadow: var(--shadow-xl);
  animation: modalIn .18s ease-out;
}
.dialog h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.dialog input[type="text"], .dialog textarea {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid var(--border); border-radius: var(--radius);
  font-size: 14px; font-family: inherit;
  outline: none; transition: all var(--tr);
  margin-bottom: 8px;
}
.dialog input[type="text"]:focus, .dialog textarea:focus {
  border-color: var(--pri);
  box-shadow: 0 0 0 3px rgba(99,102,241,.12);
}
.dialog-row { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
.dialog-row label { font-size: 12px; font-weight: 600; color: var(--txt2); white-space: nowrap; }
.dialog-row input[type="number"] {
  width: 70px; padding: 6px 8px;
  border: 1.5px solid var(--border); border-radius: 6px;
  font-size: 13px; outline: none; transition: all var(--tr);
}
.dialog-row input[type="number"]:focus { border-color: var(--pri); }
.dialog-row input[type="color"] {
  width: 36px; height: 30px; border: 1.5px solid var(--border);
  border-radius: 6px; cursor: pointer; padding: 2px;
}
.dialog-actions {
  display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px;
}
.dialog-actions button {
  padding: 9px 22px; border-radius: var(--radius); border: none;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all var(--tr);
}
.dialog-actions .btn-cancel { background: var(--bg); color: var(--txt2); }
.dialog-actions .btn-cancel:hover { background: var(--border); }
.dialog-actions .btn-ok { background: var(--pri); color: #fff; }
.dialog-actions .btn-ok:hover { background: var(--pri-h); }

/* ===== Toast ===== */
.toast-container {
  position: fixed; bottom: 24px; right: 24px;
  z-index: 900; display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 12px 20px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500; color: #fff;
  box-shadow: var(--shadow-lg);
  animation: toastIn .25s ease-out, toastOut .25s ease-in 2.6s forwards;
  display: flex; align-items: center; gap: 8px;
}
.toast-ok { background: var(--green); }
.toast-err { background: var(--red); }
.toast-info { background: var(--pri); }
@keyframes toastIn { from { opacity: 0; transform: translateY(10px) scale(.95); } }
@keyframes toastOut { to { opacity: 0; transform: translateY(-8px) scale(.95); } }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    PDF Editor
  </div>
  <div class="sep"></div>

  <div class="toolbar-group">
    <button class="tbtn tbtn-primary" onclick="openFile()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
      開く
    </button>
    <button class="tbtn" id="btnSave" onclick="download()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      上書き保存
    </button>
    <button class="tbtn" id="btnSaveAs" onclick="saveAs()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      名前を付けて保存
    </button>
  </div>
  <div class="sep"></div>

  <div class="toolbar-group">
    <button class="tbtn" id="btnUndo" onclick="doUndo()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      戻す
    </button>
    <button class="tbtn" id="btnRedo" onclick="doRedo()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      やり直し
    </button>
  </div>
  <div class="sep"></div>

  <div class="toolbar-group">
    <button class="tbtn" onclick="zoomOut()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <span class="zoom-display" id="zoomLbl">100%</span>
    <button class="tbtn" onclick="zoomIn()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
  </div>
  <div class="sep"></div>

  <div class="toolbar-group">
    <button class="tbtn" id="btnEditText" onclick="editTextMode()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      テキスト編集
    </button>
    <button class="tbtn" onclick="addTextMode()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      テキスト追加
    </button>
    <button class="tbtn" onclick="addImageMode()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      画像挿入
    </button>
  </div>
  <div class="sep"></div>

  <div class="toolbar-group">
    <button class="tbtn" id="btnRect" onclick="setDrawMode('rect')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
      四角
    </button>
    <button class="tbtn" id="btnEllipse" onclick="setDrawMode('ellipse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="10" ry="8"/></svg>
      楕円
    </button>
    <button class="tbtn" id="btnLine" onclick="setDrawMode('line')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="19" x2="19" y2="5"/></svg>
      直線
    </button>
  </div>
</header>

<!-- Main Layout -->
<div class="main-layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <h2>Pages</h2>
      <div class="sidebar-actions">
        <button class="sb-icon-btn" onclick="toggleSelectMode()" title="選択モード" id="btnSelectMode">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </button>
        <button class="sb-icon-btn" onclick="addPage()" title="ページ追加">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="sb-icon-btn danger" onclick="deletePage()" title="ページ削除">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    </div>
    <div class="page-list" id="pageList"></div>
    <div class="sidebar-footer">
      <button onclick="movePage(-1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>
        上へ
      </button>
      <button onclick="movePage(1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        下へ
      </button>
    </div>
  </aside>

  <!-- Editor -->
  <main class="editor-area" id="editorArea">
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <h2>PDFファイルを開く</h2>
      <p>ドラッグ&ドロップ または下のボタンから</p>
      <button class="btn-open" onclick="openFile()">ファイルを選択</button>
    </div>
  </main>
</div>

<input type="file" id="fileInput" accept=".pdf" hidden>
<input type="file" id="imgInput" accept="image/*" hidden>
<div class="toast-container" id="toasts"></div>

<script>
// ── State ──
const S = { pages: 0, cur: 0, zoom: 2, mode: null, drawColor: [0,0,0], drawWidth: 2, drawStart: null };

// ── Helpers ──
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  $('#toasts').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

function hexToRgb01(h) {
  h = h.replace('#', '');
  return [parseInt(h.slice(0,2),16)/255, parseInt(h.slice(2,4),16)/255, parseInt(h.slice(4,6),16)/255];
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ── File Open ──
function openFile() { $('#fileInput').click(); }

$('#fileInput').addEventListener('change', async e => {
  const f = e.target.files[0]; if (!f) return;
  await loadPdf(f);
  e.target.value = '';
});

async function loadPdf(file) {
  toast('読み込み中...', 'info');
  const fd = new FormData(); fd.append('file', file);
  try {
    const r = await fetch('/api/open', { method: 'POST', body: fd });
    if (!r.ok) { toast(`サーバーエラー: ${r.status}`, 'err'); return; }
    const j = await r.json();
    if (j.error) { toast(j.error, 'err'); return; }
    S.pages = j.pages; S.cur = 0; S.filename = j.filename;
    $('#emptyState').style.display = 'none';
    $('#btnSave').disabled = false; $('#btnSaveAs').disabled = false;
    renderPageList();
    renderPage();
    toast(`${j.filename} (${j.pages}ページ)`, 'ok');
  } catch (e) {
    toast('ファイルを開けません: ' + e.message, 'err');
    console.error('loadPdf error:', e);
  }
}

// ── Drag & Drop ──
const edArea = $('#editorArea');
edArea.addEventListener('dragover', e => { e.preventDefault(); edArea.classList.add('drag-over'); });
edArea.addEventListener('dragleave', () => edArea.classList.remove('drag-over'));
edArea.addEventListener('drop', async e => {
  e.preventDefault(); edArea.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (!f) return;
  if (f.type !== 'application/pdf') { toast('PDFファイルのみ対応しています', 'err'); return; }
  await loadPdf(f);
});

// ── Selection mode ──
let selectMode = false;
const selectedPages = new Set();

function toggleSelectMode() {
  selectMode = !selectMode;
  selectedPages.clear();
  $('#sidebar').classList.toggle('select-mode', selectMode);
  $('#btnSelectMode').classList.toggle('active', selectMode);
  renderPageList();
}

// ── Page List (with drag & drop reorder + thumbnail cache) ──
let dragSrcIdx = null;
const thumbCache = {};
let thumbCacheKey = 0;

function invalidateThumbs() { thumbCacheKey++; }

function getThumbSrc(i) {
  const key = `${thumbCacheKey}_${i}`;
  if (thumbCache[key]) return thumbCache[key];
  const src = `/api/page/${i}?zoom=0.5&t=${Date.now()}`;
  thumbCache[key] = src;
  return src;
}

function renderPageList() {
  const list = $('#pageList'); list.innerHTML = '';
  for (let i = 0; i < S.pages; i++) {
    const item = document.createElement('div');
    item.className = 'page-item' + (i === S.cur ? ' active' : '');
    item.draggable = true;
    item.dataset.idx = i;

    const thumb = document.createElement('img');
    thumb.className = 'page-thumb';
    thumb.src = getThumbSrc(i);
    thumb.alt = `ページ ${i + 1}`;
    thumb.loading = 'lazy';

    const label = document.createElement('span');
    label.className = 'page-label';
    label.textContent = `${i + 1}`;

    const check = document.createElement('input');
    check.type = 'checkbox';
    check.className = 'page-check';
    check.checked = selectedPages.has(i);
    check.onclick = e => {
      e.stopPropagation();
      if (check.checked) { selectedPages.add(i); } else { selectedPages.delete(i); }
      item.classList.toggle('selected', check.checked);
    };

    item.appendChild(check);
    item.appendChild(thumb);
    item.appendChild(label);
    if (selectedPages.has(i)) item.classList.add('selected');
    item.onclick = () => {
      if (selectMode) {
        check.checked = !check.checked;
        if (check.checked) { selectedPages.add(i); } else { selectedPages.delete(i); }
        item.classList.toggle('selected', check.checked);
        return;
      }
      S.cur = i; renderPageList(); renderPage();
    };

    // ── Drag & Drop ──
    item.addEventListener('dragstart', e => {
      dragSrcIdx = i;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      // Need a tiny delay for the drag image to render properly
      requestAnimationFrame(() => item.classList.add('dragging'));
    });

    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      clearAllDragStyles();
    });

    item.addEventListener('dragover', e => {
      e.preventDefault();
      if (dragSrcIdx === null || dragSrcIdx === i) return;
      e.dataTransfer.dropEffect = 'move';
      clearAllDragStyles();
      // Show insertion indicator: above or below based on mouse position
      const rect = item.getBoundingClientRect();
      const midY = rect.top + rect.height / 2;
      if (e.clientY < midY) {
        item.classList.add('drag-over-top');
      } else {
        item.classList.add('drag-over-bottom');
      }
    });

    item.addEventListener('dragleave', () => {
      item.classList.remove('drag-over-top', 'drag-over-bottom');
    });

    item.addEventListener('drop', async e => {
      e.preventDefault();
      clearAllDragStyles();
      const targetIdx = i;
      if (dragSrcIdx === null || dragSrcIdx === targetIdx) { dragSrcIdx = null; return; }

      // Determine insert position based on mouse
      const rect = item.getBoundingClientRect();
      const midY = rect.top + rect.height / 2;
      const insertBefore = e.clientY < midY;
      const to = insertBefore ? targetIdx : targetIdx + 1;
      // Adjust 'to' for PyMuPDF move_page (which accounts for removal)
      const adjustedTo = dragSrcIdx < to ? to : to;

      try {
        await fetch('/api/move_page', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ from: dragSrcIdx, to: adjustedTo })
        });
        // Calculate new current page
        if (S.cur === dragSrcIdx) {
          S.cur = adjustedTo > dragSrcIdx ? adjustedTo - 1 : adjustedTo;
        } else if (dragSrcIdx < S.cur && adjustedTo > S.cur) {
          S.cur--;
        } else if (dragSrcIdx > S.cur && adjustedTo <= S.cur) {
          S.cur++;
        }
        invalidateThumbs();
        renderPageList(); renderPage(); enableUndoRedo();
      } catch (err) { toast('移動に失敗しました', 'err'); }
      dragSrcIdx = null;
    });

    list.appendChild(item);
  }
}

function clearAllDragStyles() {
  $$('.page-item').forEach(el => el.classList.remove('drag-over-top', 'drag-over-bottom'));
}

// ── Page Render ──
function renderPage() {
  const old = edArea.querySelector('.page-display');
  if (old) old.remove();
  if (S.pages === 0) return;

  const wrap = document.createElement('div');
  wrap.className = 'page-display';
  const img = document.createElement('img');
  img.className = 'page-canvas';
  img.src = `/api/page/${S.cur}?zoom=${S.zoom}&t=${Date.now()}`;
  img.addEventListener('mousedown', onCanvasMouseDown);
  img.addEventListener('mousemove', onCanvasMouseMove);
  img.addEventListener('mouseup', onCanvasMouseUp);
  img.ondragstart = () => false;
  wrap.appendChild(img);
  edArea.appendChild(wrap);
}

// ── Zoom ──
function zoomIn() {
  S.zoom = Math.min(6, S.zoom + 0.5);
  $('#zoomLbl').textContent = Math.round(S.zoom / 2 * 100) + '%';
  if (S.pages > 0) renderPage();
}
function zoomOut() {
  S.zoom = Math.max(0.5, S.zoom - 0.5);
  $('#zoomLbl').textContent = Math.round(S.zoom / 2 * 100) + '%';
  if (S.pages > 0) renderPage();
}

// ── Undo / Redo ──
async function doUndo() {
  const r = await fetch('/api/undo', { method: 'POST' });
  const j = await r.json();
  if (j.ok) { S.pages = j.pages; S.cur = Math.min(S.cur, S.pages - 1); renderPageList(); renderPage(); }
}
async function doRedo() {
  const r = await fetch('/api/redo', { method: 'POST' });
  const j = await r.json();
  if (j.ok) { S.pages = j.pages; S.cur = Math.min(S.cur, S.pages - 1); renderPageList(); renderPage(); }
}
function enableUndoRedo() {
  $('#btnUndo').disabled = false;
  $('#btnRedo').disabled = false;
}

// ── Text Edit (existing PDF text) ──
async function editTextMode() {
  if (S.pages === 0) { toast('PDFを先に開いてください', 'info'); return; }
  const r = await fetch(`/api/text/${S.cur}`);
  const j = await r.json();
  if (!j.spans || !j.spans.length) { toast('このページにテキストはありません', 'info'); return; }
  showTextListModal(j.spans);
}

function showTextListModal(spans) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = `
    <div class="modal-header">
      <h2>テキスト編集</h2>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
    </div>
    <div class="modal-subtitle">編集したいテキストの「編集」ボタンをクリックしてください</div>
    <div class="modal-body" id="textListBody"></div>
    <div class="modal-footer"><button onclick="this.closest('.modal-overlay').remove()">閉じる</button></div>
  `;
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  const body = modal.querySelector('#textListBody');
  spans.forEach(sp => {
    const row = document.createElement('div');
    row.className = 'text-row';
    row.innerHTML = `
      <span class="text-content">${escHtml(sp.text)}</span>
      <span class="text-meta">${sp.size}pt</span>
      <button class="text-edit-btn">編集</button>
    `;
    row.querySelector('.text-edit-btn').onclick = () => {
      overlay.remove();
      showTextEditDialog(sp);
    };
    body.appendChild(row);
  });
}

function showTextEditDialog(span) {
  const overlay = document.createElement('div');
  overlay.className = 'dialog-overlay';
  overlay.innerHTML = `
    <div class="dialog">
      <h3>テキストを編集</h3>
      <input type="text" id="dlgEditText" value="${escAttr(span.text)}">
      <div class="dialog-row">
        <label>サイズ:</label>
        <input type="number" id="dlgEditSize" value="${span.size}" min="4" max="200" step="0.5">
        <label>色:</label>
        <input type="color" id="dlgEditColor" value="${span.color}">
      </div>
      <div class="dialog-actions">
        <button class="btn-cancel" onclick="this.closest('.dialog-overlay').remove()">キャンセル</button>
        <button class="btn-ok" id="dlgEditOk">変更</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  const input = overlay.querySelector('#dlgEditText');
  input.focus(); input.select();

  async function doEdit() {
    const newText = overlay.querySelector('#dlgEditText').value;
    const fontSize = parseFloat(overlay.querySelector('#dlgEditSize').value) || span.size;
    const colorHex = overlay.querySelector('#dlgEditColor').value;
    const color = hexToRgb01(colorHex);
    overlay.remove();

    if (newText === span.text) return;

    try {
      await fetch('/api/edit_text', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ page: S.cur, bbox: span.bbox, new_text: newText, font_size: fontSize, color })
      });
      renderPage(); enableUndoRedo();
      toast('テキストを変更しました', 'ok');
    } catch (e) {
      toast('テキスト編集に失敗しました', 'err');
    }
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') doEdit();
    if (e.key === 'Escape') overlay.remove();
  });
  overlay.querySelector('#dlgEditOk').onclick = doEdit;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

// ── Add Text ──
function addTextMode() {
  if (S.pages === 0) { toast('PDFを先に開いてください', 'info'); return; }
  showAddTextDialog();
}

function showAddTextDialog() {
  const overlay = document.createElement('div');
  overlay.className = 'dialog-overlay';
  overlay.innerHTML = `
    <div class="dialog">
      <h3>テキストを追加</h3>
      <input type="text" id="dlgAddText" placeholder="テキストを入力...">
      <div class="dialog-row">
        <label>サイズ:</label>
        <input type="number" id="dlgAddSize" value="14" min="4" max="200" step="0.5">
        <label>色:</label>
        <input type="color" id="dlgAddColor" value="#000000">
      </div>
      <div class="dialog-actions">
        <button class="btn-cancel" onclick="this.closest('.dialog-overlay').remove()">キャンセル</button>
        <button class="btn-ok" id="dlgAddOk">OK</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#dlgAddText').focus();

  function go() {
    const text = overlay.querySelector('#dlgAddText').value;
    const size = parseFloat(overlay.querySelector('#dlgAddSize').value) || 14;
    const color = hexToRgb01(overlay.querySelector('#dlgAddColor').value);
    overlay.remove();
    if (!text) return;
    S.mode = { type: 'add_text', text, size, color };
    toast('ページ上をクリックして配置してください', 'info');
  }

  overlay.querySelector('#dlgAddText').addEventListener('keydown', e => {
    if (e.key === 'Enter') go();
    if (e.key === 'Escape') overlay.remove();
  });
  overlay.querySelector('#dlgAddOk').onclick = go;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

// ── Add Image ──
function addImageMode() {
  if (S.pages === 0) { toast('PDFを先に開いてください', 'info'); return; }
  $('#imgInput').click();
}
$('#imgInput').addEventListener('change', e => {
  if (e.target.files[0]) {
    S.mode = { type: 'add_image', file: e.target.files[0] };
    toast('ページ上をクリックして配置してください', 'info');
  }
  e.target.value = '';
});

// ── Draw Shapes ──
function setDrawMode(shape) {
  if (S.pages === 0) { toast('PDFを先に開いてください', 'info'); return; }
  // Toggle off if same shape
  if (S.mode?.type === 'draw' && S.mode.shape === shape) {
    S.mode = null;
    $$('.tbtn').forEach(b => b.classList.remove('active'));
    return;
  }
  S.mode = { type: 'draw', shape };
  $$('.tbtn').forEach(b => b.classList.remove('active'));
  const id = '#btn' + shape.charAt(0).toUpperCase() + shape.slice(1);
  $(id)?.classList.add('active');
  toast('ページ上でドラッグして描画', 'info');
}

// ── Canvas Mouse Events ──
function imgToCoord(img, e) {
  const r = img.getBoundingClientRect();
  return { x: (e.clientX - r.left) / S.zoom, y: (e.clientY - r.top) / S.zoom };
}

async function onCanvasMouseDown(e) {
  const img = e.target;
  const p = imgToCoord(img, e);

  if (S.mode?.type === 'add_text') {
    try {
      await fetch('/api/add_text', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ page: S.cur, x: p.x, y: p.y, text: S.mode.text, size: S.mode.size, color: S.mode.color })
      });
      renderPage(); enableUndoRedo();
      toast('テキストを追加しました', 'ok');
    } catch (e) { toast('テキスト追加に失敗', 'err'); }
    S.mode = null;
    return;
  }

  if (S.mode?.type === 'add_image') {
    const fd = new FormData();
    fd.append('image', S.mode.file);
    fd.append('page', S.cur);
    fd.append('x', p.x); fd.append('y', p.y); fd.append('w', 200);
    try {
      await fetch('/api/add_image', { method: 'POST', body: fd });
      renderPage(); enableUndoRedo();
      toast('画像を挿入しました', 'ok');
    } catch (e) { toast('画像挿入に失敗', 'err'); }
    S.mode = null;
    return;
  }

  if (S.mode?.type === 'draw') {
    S.drawStart = p;
  }
}

function onCanvasMouseMove(e) { /* reserved for future preview */ }

async function onCanvasMouseUp(e) {
  if (!S.drawStart || S.mode?.type !== 'draw') return;
  const p = imgToCoord(e.target, e);
  const s = S.drawStart; S.drawStart = null;
  if (Math.abs(p.x - s.x) < 3 && Math.abs(p.y - s.y) < 3) return;

  try {
    await fetch('/api/draw_shape', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        page: S.cur, type: S.mode.shape,
        x0: Math.min(s.x, p.x), y0: Math.min(s.y, p.y),
        x1: Math.max(s.x, p.x), y1: Math.max(s.y, p.y),
        color: S.drawColor, width: S.drawWidth
      })
    });
    renderPage(); enableUndoRedo();
    toast('図形を追加しました', 'ok');
  } catch (e) { toast('図形描画に失敗', 'err'); }

  S.mode = null;
  $$('.tbtn').forEach(b => b.classList.remove('active'));
}

// ── Page Operations ──
async function addPage() {
  if (S.pages === 0) { toast('PDFを先に開いてください', 'info'); return; }
  const r = await fetch('/api/add_page', { method: 'POST' });
  const j = await r.json();
  if (j.ok) { S.pages = j.pages; S.cur = S.pages - 1; invalidateThumbs(); renderPageList(); renderPage(); enableUndoRedo(); }
}

async function deletePage() {
  if (S.pages <= 1) { toast('最後のページは削除できません', 'err'); return; }

  // Multiple selection mode
  if (selectMode && selectedPages.size > 0) {
    const pages = [...selectedPages].sort((a, b) => a - b);
    if (pages.length >= S.pages) { toast('すべてのページは削除できません', 'err'); return; }
    const label = pages.map(p => p + 1).join(', ');
    showConfirmDialog(`ページ ${label} を削除しますか？（${pages.length}ページ）`, async () => {
      await fetch('/api/delete_pages', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pages })
      });
      S.pages -= pages.length;
      S.cur = Math.min(S.cur, S.pages - 1);
      selectedPages.clear();
      invalidateThumbs(); renderPageList(); renderPage(); enableUndoRedo();
      toast(`${pages.length}ページを削除しました`, 'ok');
    });
    return;
  }

  // Single page delete
  showConfirmDialog(`ページ ${S.cur + 1} を削除しますか？`, async () => {
    await fetch('/api/delete_page', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ page: S.cur })
    });
    S.pages--; S.cur = Math.min(S.cur, S.pages - 1);
    invalidateThumbs(); renderPageList(); renderPage(); enableUndoRedo();
    toast('ページを削除しました', 'ok');
  });
}

function showConfirmDialog(message, onOk) {
  const overlay = document.createElement('div');
  overlay.className = 'dialog-overlay';
  overlay.innerHTML = `
    <div class="dialog">
      <h3>${escHtml(message)}</h3>
      <div class="dialog-actions">
        <button class="btn-cancel" id="cfmNo">キャンセル</button>
        <button class="btn-ok" id="cfmYes" style="background:var(--red)">削除</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#cfmNo').onclick = () => overlay.remove();
  overlay.querySelector('#cfmYes').onclick = () => { overlay.remove(); onOk(); };
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

async function movePage(dir) {
  if (S.pages <= 1) return;
  const from = S.cur;
  if (dir < 0 && from <= 0) return;
  if (dir > 0 && from >= S.pages - 1) return;
  const to = dir < 0 ? from - 1 : from + 2;
  try {
    await fetch('/api/move_page', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ from, to })
    });
    S.cur += dir;
    invalidateThumbs(); renderPageList(); renderPage(); enableUndoRedo();
    toast(`ページ ${from + 1} → ${S.cur + 1}`, 'ok');
  } catch (e) { toast('移動に失敗しました', 'err'); }
}

function download() { window.location = '/api/download'; }

function saveAs() {
  const overlay = document.createElement('div');
  overlay.className = 'dialog-overlay';
  const currentName = S.filename || 'edited.pdf';
  const baseName = currentName.replace(/\.pdf$/i, '');
  overlay.innerHTML = `
    <div class="dialog">
      <h3>名前を付けて保存</h3>
      <input type="text" id="dlgSaveName" value="${escAttr(baseName)}" placeholder="ファイル名">
      <div style="font-size:11px;color:var(--txt3);margin-top:-4px;margin-bottom:12px">.pdf は自動で付きます</div>
      <div class="dialog-actions">
        <button class="btn-cancel" onclick="this.closest('.dialog-overlay').remove()">キャンセル</button>
        <button class="btn-ok" id="dlgSaveOk">保存</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  const input = overlay.querySelector('#dlgSaveName');
  input.focus(); input.select();

  function doSave() {
    let name = input.value.trim();
    if (!name) { toast('ファイル名を入力してください', 'err'); return; }
    if (!name.toLowerCase().endsWith('.pdf')) name += '.pdf';
    overlay.remove();
    window.location = `/api/download?name=${encodeURIComponent(name)}`;
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') doSave();
    if (e.key === 'Escape') overlay.remove();
  });
  overlay.querySelector('#dlgSaveOk').onclick = doSave;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

// ── Keyboard Shortcuts ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const mod = e.metaKey || e.ctrlKey;
  if (mod && e.key === 'z' && !e.shiftKey) { e.preventDefault(); doUndo(); }
