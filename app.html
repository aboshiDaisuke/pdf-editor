<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Editor</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --pri: #6366f1; --pri-h: #4f46e5; --pri-l: #eef2ff;
  --bg: #f1f5f9; --surface: #ffffff; --surface-h: #f8fafc;
  --border: #e2e8f0; --border-s: #cbd5e1;
  --txt: #0f172a; --txt2: #475569; --txt3: #94a3b8;
  --red: #ef4444; --green: #22c55e; --amber: #f59e0b;
  --radius: 8px; --radius-lg: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,.06), 0 2px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.1), 0 4px 10px rgba(0,0,0,.04);
  --shadow-xl: 0 20px 50px rgba(0,0,0,.15);
  --tr: 150ms ease;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", "Hiragino Sans", sans-serif;
  background: var(--bg); color: var(--txt);
  height: 100vh; overflow: hidden; font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

/* ===== Header ===== */
.header {
  height: 50px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 12px; gap: 2px;
  box-shadow: var(--shadow);
  position: relative; z-index: 100;
}
.logo {
  display: flex; align-items: center; gap: 7px;
  font-size: 14px; font-weight: 700; letter-spacing: -0.3px;
  padding-right: 10px; color: var(--txt); user-select: none;
}
.logo-icon { width: 20px; height: 20px; color: var(--pri); }
.sep { width: 1px; height: 26px; background: var(--border); margin: 0 6px; flex-shrink: 0; }
.toolbar-group { display: flex; align-items: center; gap: 2px; }

.tbtn {
  height: 32px; padding: 0 10px;
  border: 1px solid transparent; border-radius: 7px;
  background: transparent; color: var(--txt2);
  font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all var(--tr);
  display: inline-flex; align-items: center; gap: 5px;
  white-space: nowrap; user-select: none;
}
.tbtn:hover { background: var(--bg); color: var(--txt); }
.tbtn:active { transform: scale(0.97); }
.tbtn.active { background: var(--pri-l); color: var(--pri); border-color: rgba(99,102,241,.25); }
.tbtn:disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }
.tbtn svg { width: 16px; height: 16px; flex-shrink: 0; }
.tbtn.icon-only { padding: 0 8px; }
.tbtn-primary { background: var(--pri); color: #fff; border-color: var(--pri); font-weight: 600; }
.tbtn-primary:hover { background: var(--pri-h); }

.zoom-display { font-size: 11px; font-weight: 700; color: var(--txt3); min-width: 42px; text-align: center; user-select: none; }
#pageIndicator { cursor: pointer; border-radius: 6px; padding: 3px 6px; transition: background var(--tr); }
#pageIndicator:hover { background: var(--bg); color: var(--txt); }
.spacer { flex: 1; }
.doc-title { font-size: 12px; font-weight: 600; color: var(--txt2); max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; user-select: none; }
.doc-title .dot { color: var(--amber); margin-left: 4px; }

/* ===== Tool options bar ===== */
.tool-options {
  height: 40px; background: var(--surface-h);
  border-bottom: 1px solid var(--border);
  display: none; align-items: center; gap: 14px;
  padding: 0 16px; position: relative; z-index: 90;
}
.tool-options.show { display: flex; }
.tool-options .to-label { font-size: 12px; font-weight: 600; color: var(--txt2); }
.tool-options .to-field { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--txt3); font-weight: 600; }
.tool-options input[type="color"] { width: 32px; height: 26px; border: 1.5px solid var(--border); border-radius: 6px; cursor: pointer; padding: 2px; }
.tool-options input[type="range"] { width: 110px; accent-color: var(--pri); }
.tool-options .to-chk { display: flex; align-items: center; gap: 5px; cursor: pointer; }

/* ===== Layout ===== */
.main-layout { display: flex; height: calc(100vh - 50px); }
.main-layout.has-options { height: calc(100vh - 90px); }

/* ===== Sidebar ===== */
.sidebar { width: 200px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-head { padding: 12px 12px 8px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.sidebar-head h2 { font-size: 11px; font-weight: 700; color: var(--txt3); text-transform: uppercase; letter-spacing: .6px; }
.sidebar-actions { display: flex; gap: 3px; flex-wrap: wrap; }
.sb-icon-btn { width: 26px; height: 26px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--tr); color: var(--txt3); }
.sb-icon-btn svg { width: 13px; height: 13px; }
.sb-icon-btn:hover { background: var(--bg); border-color: var(--border-s); color: var(--txt2); }
.sb-icon-btn.active { background: var(--pri-l); border-color: rgba(99,102,241,.25); color: var(--pri); }
.sb-icon-btn.danger:hover { background: #fef2f2; border-color: #fecaca; color: var(--red); }

.page-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
.page-list::-webkit-scrollbar { width: 4px; }
.page-list::-webkit-scrollbar-thumb { background: var(--border-s); border-radius: 2px; }

.page-item { padding: 8px; border-radius: var(--radius); cursor: grab; font-size: 11px; font-weight: 600; color: var(--txt3); transition: transform .2s ease, box-shadow .2s ease, background .15s ease, border-color .15s ease; display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; border: 2px solid transparent; }
.page-item:hover { background: var(--surface-h); border-color: var(--border); }
.page-item.active { border-color: var(--pri); background: var(--pri-l); color: var(--pri); box-shadow: 0 2px 8px rgba(99,102,241,.15); }
.page-item.dragging { opacity: 0.3; transform: scale(0.95); }
.page-item.drag-over-top { border-top: 3px solid var(--pri); border-radius: 3px 3px var(--radius) var(--radius); }
.page-item.drag-over-bottom { border-bottom: 3px solid var(--pri); border-radius: var(--radius) var(--radius) 3px 3px; }
.page-item .page-thumb { width: 100%; aspect-ratio: 210 / 297; object-fit: contain; border-radius: 4px; background: #fff; display: block; box-shadow: 0 1px 4px rgba(0,0,0,.1); pointer-events: none; }
.page-item .page-label { text-align: center; pointer-events: none; }
.page-item .page-check { position: absolute; top: 6px; left: 6px; width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border-s); background: var(--surface); cursor: pointer; display: none; z-index: 2; appearance: none; -webkit-appearance: none; margin: 0; transition: all var(--tr); }
.page-item .page-check:checked { background: var(--pri); border-color: var(--pri); background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2.5-2.5a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3E%3C/svg%3E"); background-size: 14px; background-position: center; background-repeat: no-repeat; }
.sidebar.select-mode .page-item .page-check { display: block; }
.sidebar.select-mode .page-item { padding-left: 28px; }
.page-item.selected { background: var(--pri-l); border-color: rgba(99,102,241,.3); }

.sidebar-footer { padding: 10px 8px; border-top: 1px solid var(--border); display: flex; gap: 4px; }
.sidebar-footer button { flex: 1; height: 28px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); cursor: pointer; font-size: 11px; font-weight: 500; color: var(--txt2); transition: all var(--tr); display: flex; align-items: center; justify-content: center; gap: 4px; }
.sidebar-footer button:hover { background: var(--bg); border-color: var(--border-s); }
.sidebar-footer button svg { width: 12px; height: 12px; }

/* ===== Editor Area ===== */
.editor-area { flex: 1; overflow: auto; background: var(--bg); display: flex; align-items: flex-start; justify-content: center; position: relative; }
.editor-area.drag-over::after { content: ''; position: absolute; inset: 16px; border: 3px dashed var(--pri); border-radius: 16px; background: rgba(99,102,241,.04); pointer-events: none; z-index: 50; }

.empty-state { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; user-select: none; }
.empty-state svg { width: 72px; height: 72px; color: var(--txt3); opacity: .3; margin-bottom: 12px; }
.empty-state h2 { font-size: 18px; font-weight: 700; color: var(--txt2); }
.empty-state p { font-size: 13px; color: var(--txt3); margin-bottom: 20px; }
.btn-open { padding: 12px 32px; background: var(--pri); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; transition: all var(--tr); box-shadow: 0 2px 8px rgba(99,102,241,.3); }
.btn-open:hover { background: var(--pri-h); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,.4); }

.page-display { padding: 32px; flex-shrink: 0; }
.page-stage { position: relative; line-height: 0; }
.page-canvas { box-shadow: var(--shadow-lg); border-radius: 3px; display: block; background: #fff; transition: box-shadow var(--tr); }
.page-stage.tool-draw .page-canvas { cursor: crosshair; }
.page-stage.tool-text .page-canvas { cursor: text; }
.overlay { position: absolute; top: 0; left: 0; pointer-events: none; }
.overlay .search-hit { fill: rgba(245,158,11,.35); stroke: var(--amber); stroke-width: 1; }
.overlay .search-hit.current { fill: rgba(99,102,241,.4); stroke: var(--pri); stroke-width: 1.5; }

/* ===== Right panel (search / forms) ===== */
.right-panel { width: 280px; background: var(--surface); border-left: 1px solid var(--border); display: none; flex-direction: column; flex-shrink: 0; }
.right-panel.show { display: flex; }
.rp-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.rp-head h3 { font-size: 13px; font-weight: 700; }
.rp-body { flex: 1; overflow-y: auto; padding: 14px 16px; }
.rp-search-input { display: flex; gap: 6px; margin-bottom: 12px; }
.rp-search-input input { flex: 1; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; }
.rp-search-input input:focus { border-color: var(--pri); }
.rp-search-input button { padding: 0 14px; border: none; border-radius: 8px; background: var(--pri); color: #fff; font-weight: 600; cursor: pointer; }
.rp-count { font-size: 11px; color: var(--txt3); font-weight: 600; margin-bottom: 8px; }
.search-result { padding: 8px 10px; border-radius: 7px; cursor: pointer; font-size: 12px; color: var(--txt2); display: flex; align-items: center; gap: 8px; transition: all var(--tr); }
.search-result:hover { background: var(--pri-l); }
.search-result.active { background: var(--pri-l); color: var(--pri); font-weight: 600; }
.search-result .pg { font-size: 10px; font-weight: 700; color: var(--txt3); background: var(--bg); padding: 2px 6px; border-radius: 4px; }
.form-field { margin-bottom: 14px; }
.form-field label { display: block; font-size: 11px; font-weight: 600; color: var(--txt2); margin-bottom: 4px; }
.form-field input[type="text"], .form-field select { width: 100%; padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 7px; font-size: 13px; outline: none; }
.form-field input:focus, .form-field select:focus { border-color: var(--pri); }
.form-field .ftype { font-size: 10px; color: var(--txt3); float: right; font-weight: 600; }
.rp-empty { font-size: 12px; color: var(--txt3); text-align: center; padding: 30px 10px; }

/* ===== Modal / Dialog ===== */
.modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.4); backdrop-filter: blur(4px); z-index: 500; display: flex; align-items: center; justify-content: center; animation: fadeIn .15s ease-out; }
.modal { background: var(--surface); border-radius: 16px; width: 620px; max-width: calc(100vw - 40px); max-height: 80vh; display: flex; flex-direction: column; box-shadow: var(--shadow-xl); animation: modalIn .2s ease-out; }
@keyframes fadeIn { from { opacity: 0; } }
@keyframes modalIn { from { opacity: 0; transform: scale(.96) translateY(8px); } }
.modal-header { padding: 22px 26px 14px; display: flex; align-items: center; justify-content: space-between; }
.modal-header h2 { font-size: 17px; font-weight: 700; }
.modal-close { width: 32px; height: 32px; border: none; border-radius: 8px; background: var(--bg); cursor: pointer; font-size: 18px; color: var(--txt3); transition: all var(--tr); display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: var(--border); color: var(--txt); }
.modal-subtitle { padding: 0 26px 14px; font-size: 12px; color: var(--txt3); }
.modal-body { flex: 1; overflow-y: auto; padding: 0 26px 18px; }
.text-row { display: flex; align-items: center; padding: 10px 14px; background: var(--bg); border-radius: var(--radius); margin-bottom: 6px; gap: 10px; transition: all var(--tr); border: 1px solid transparent; }
.text-row:hover { background: var(--pri-l); border-color: rgba(99,102,241,.15); }
.text-content { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--txt); }
.text-meta { font-size: 10px; color: var(--txt3); font-weight: 600; padding: 2px 6px; background: var(--surface); border-radius: 4px; white-space: nowrap; }
.text-edit-btn { padding: 6px 16px; border: none; border-radius: 6px; background: var(--pri); color: #fff; font-size: 11px; font-weight: 600; cursor: pointer; transition: all var(--tr); white-space: nowrap; }
.text-edit-btn:hover { background: var(--pri-h); }
.modal-footer { padding: 14px 26px 22px; text-align: right; border-top: 1px solid var(--border); }
.modal-footer button { padding: 8px 22px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); cursor: pointer; font-size: 12px; font-weight: 500; color: var(--txt2); transition: all var(--tr); }
.modal-footer button:hover { background: var(--bg); }

.dialog-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.35); backdrop-filter: blur(3px); z-index: 600; display: flex; align-items: center; justify-content: center; animation: fadeIn .12s ease-out; }
.dialog { background: #fff; border-radius: 14px; padding: 26px; width: 440px; max-width: calc(100vw - 40px); box-shadow: var(--shadow-xl); animation: modalIn .18s ease-out; }
.dialog h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.dialog input[type="text"], .dialog textarea { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: inherit; outline: none; transition: all var(--tr); margin-bottom: 8px; }
.dialog textarea { min-height: 90px; resize: vertical; }
.dialog input[type="text"]:focus, .dialog textarea:focus { border-color: var(--pri); box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
.dialog-row { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; }
.dialog-row label { font-size: 12px; font-weight: 600; color: var(--txt2); white-space: nowrap; }
.dialog-row input[type="number"] { width: 70px; padding: 6px 8px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; }
.dialog-row input[type="color"] { width: 36px; height: 30px; border: 1.5px solid var(--border); border-radius: 6px; cursor: pointer; padding: 2px; }
.dialog-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
.dialog-actions button { padding: 9px 22px; border-radius: var(--radius); border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all var(--tr); }
.dialog-actions .btn-cancel { background: var(--bg); color: var(--txt2); }
.dialog-actions .btn-cancel:hover { background: var(--border); }
.dialog-actions .btn-ok { background: var(--pri); color: #fff; }
.dialog-actions .btn-ok:hover { background: var(--pri-h); }

/* ===== Toast ===== */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 900; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 500; color: #fff; box-shadow: var(--shadow-lg); animation: toastIn .25s ease-out, toastOut .25s ease-in 2.6s forwards; display: flex; align-items: center; gap: 8px; }
.toast-ok { background: var(--green); } .toast-err { background: var(--red); } .toast-info { background: var(--pri); }
@keyframes toastIn { from { opacity: 0; transform: translateY(10px) scale(.95); } }
@keyframes toastOut { to { opacity: 0; transform: translateY(-8px) scale(.95); } }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    PDF Editor
  </div>
  <div class="sep"></div>

  <div class="toolbar-group">
    <button class="tbtn tbtn-primary" onclick="openFile()" title="開く">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>開く
    </button>
    <button class="tbtn" id="btnSave" onclick="save()" disabled title="保存 (⌘S)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>保存
    </button>
    <button class="tbtn" id="btnSaveAs" onclick="saveAs()" disabled title="名前を付けて保存">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>別名で保存
    </button>
  </div>
  <div class="sep"></div>

  <div class="toolbar-group">
    <button class="tbtn icon-only" id="btnUndo" onclick="doUndo()" disabled title="元に戻す (⌘Z)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    </button>
    <button class="tbtn icon-only" id="btnRedo" onclick="doRedo()" disabled title="やり直し (⌘⇧Z)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
  </div>
  <div class="sep"></div>

  <div class="toolbar-group">
    <button class="tbtn icon-only" onclick="prevPage()" title="前のページ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="zoom-display" id="pageIndicator" title="ページ移動">– / –</span>
    <button class="tbtn icon-only" onclick="nextPage()" title="次のページ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>
  <div class="sep"></div>

  <div class="toolbar-group">
    <button class="tbtn icon-only" onclick="zoomOut()" title="縮小"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
    <span class="zoom-display" id="zoomLbl">100%</span>
    <button class="tbtn icon-only" onclick="zoomIn()" title="拡大"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
    <button class="tbtn icon-only" onclick="fitWidth()" title="幅に合わせる"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 3 16 3"/><polyline points="3 16 3 21 8 21"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
  </div>
  <div class="sep"></div>

  <!-- Edit tools -->
  <div class="toolbar-group">
    <button class="tbtn" id="btnEditText" onclick="editTextMode()" title="既存テキストを編集（ページ上の文字をダブルクリックでも可）"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>編集</button>
    <button class="tbtn tool" data-tool="addText" onclick="setTool('addText')" title="テキスト追加"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>文字</button>

<input type="file" id="imgInput" accept="image/*" hidden>
<div class="toast-container" id="toasts"></div>

<script>
const SVGNS = 'http://www.w3.org/2000/svg';
// ── State ──
const S = {
  pages: 0, cur: 0, zoom: 2, mode: null,
  filename: null, hasPath: false, dirty: false,
  toolColor: '#ffd400', toolWidth: 2, toolFill: false,
  draw: null,                 // transient drag/ink state
  panel: null,                // 'search' | 'forms' | null
  search: { q: '', results: [], idx: -1 },
};
let selectMode = false;
const selectedPages = new Set();
let thumbGen = 0;             // bumped on structural changes (indices shift)
const thumbRev = {};          // per-page content revision
let dragSrcIdx = null;

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  $('#toasts').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}
function hexToRgb01(h) {
  h = h.replace('#', '');
  return [parseInt(h.slice(0,2),16)/255, parseInt(h.slice(2,4),16)/255, parseInt(h.slice(4,6),16)/255];
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function hasNative() { return !!(window.pywebview && window.pywebview.api); }

// ── Central API helper: rejects on !ok or {error} ──
async function api(path, body, init = {}) {
  const opt = Object.assign({ method: body === undefined ? 'GET' : 'POST' }, init);
  if (body !== undefined) {
    if (body instanceof FormData) { opt.body = body; }
    else { opt.headers = Object.assign({ 'Content-Type': 'application/json' }, opt.headers); opt.body = JSON.stringify(body); }
  }
  const r = await fetch(path, opt);
  let j = null;
  try { j = await r.json(); } catch (e) {}
  if (!r.ok || (j && j.error)) throw new Error((j && j.error) || `サーバーエラー (${r.status})`);
  return j || {};
}

// ── Apply server status to client state + buttons ──
function applyStatus(j) {
  if (!j) return;
  if (typeof j.pages === 'number') S.pages = j.pages;
  if ('filename' in j) S.filename = j.filename;
  if ('has_path' in j) S.hasPath = j.has_path;
  if ('dirty' in j) S.dirty = j.dirty;
  $('#btnUndo').disabled = !j.can_undo;
  $('#btnRedo').disabled = !j.can_redo;
  updateTitle(); updatePageIndicator();
}
function updateTitle() {
  $('#docTitle').innerHTML = S.filename ? escHtml(S.filename) + (S.dirty ? '<span class="dot">●</span>' : '') : '';
}

// ── Thumbnails (per-page revision so edits refresh the right thumb) ──
function invalidateAllThumbs() { thumbGen++; for (const k in thumbRev) delete thumbRev[k]; }
function invalidateThumb(i) { thumbRev[i] = (thumbRev[i] || 0) + 1; }
function thumbSrc(i) { return `/api/page/${i}?zoom=0.4&v=${thumbGen}_${thumbRev[i] || 0}`; }
// Refresh just one thumbnail's image (cheap) instead of rebuilding the whole list.
function updateThumb(i) {
  const img = $(`.page-thumb[data-thumb="${i}"]`);
  if (img) img.src = thumbSrc(i);
}

// ── Open ──
function openFile() {
  if (hasNative()) {
    window.pywebview.api.pick_open().then(p => { if (p) openByPath(p); });
  } else { $('#fileInput').click(); }
}
async function openByPath(path) {
  toast('読み込み中...', 'info');
  try { onOpened(await api('/api/open_path', { path })); }
  catch (e) { toast(e.message, 'err'); }
}
async function loadPdf(file) {
  toast('読み込み中...', 'info');
  const fd = new FormData(); fd.append('file', file);
  try { onOpened(await api('/api/open', fd)); }
  catch (e) { toast('ファイルを開けません: ' + e.message, 'err'); }
}
function onOpened(j) {
  S.cur = 0;
  // reset transient + selection state for the new document
  selectMode = false; selectedPages.clear();
  $('#sidebar').classList.remove('select-mode');
  $('#btnSelectMode').classList.remove('active');
  S.search = { q: '', results: [], idx: -1 };
  clearTool();
  invalidateAllThumbs();
  applyStatus(j);
  $('#emptyState').style.display = 'none';
  $('#btnSave').disabled = false; $('#btnSaveAs').disabled = false;
  renderPageList(); renderPage();
  if (S.panel) refreshPanel();
  toast(`${j.filename || 'PDF'} (${j.pages}ページ)`, 'ok');
}

$('#fileInput').addEventListener('change', async e => {
  const f = e.target.files[0]; if (f) await loadPdf(f);
  e.target.value = '';
});

// ── Drag & Drop ──
const edArea = $('#editorArea');
edArea.addEventListener('dragover', e => { e.preventDefault(); edArea.classList.add('drag-over'); });
edArea.addEventListener('dragleave', e => { if (!edArea.contains(e.relatedTarget)) edArea.classList.remove('drag-over'); });
edArea.addEventListener('drop', async e => {
  e.preventDefault(); edArea.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (!f) return;
  if (f.type !== 'application/pdf') { toast('PDFファイルのみ対応しています', 'err'); return; }
  await loadPdf(f);
});

// ── Selection mode ──
function toggleSelectMode() {
  selectMode = !selectMode;
  selectedPages.clear();
  $('#sidebar').classList.toggle('select-mode', selectMode);
  $('#btnSelectMode').classList.toggle('active', selectMode);
  renderPageList();
}

// ── Page list (drag reorder) ──
function renderPageList() {
  const list = $('#pageList'); list.innerHTML = '';
  for (let i = 0; i < S.pages; i++) {
    const item = document.createElement('div');
    item.className = 'page-item' + (i === S.cur ? ' active' : '');
    item.draggable = true; item.dataset.idx = i;

    const thumb = document.createElement('img');
    thumb.className = 'page-thumb'; thumb.src = thumbSrc(i);
    thumb.alt = `ページ ${i + 1}`; thumb.loading = 'lazy'; thumb.dataset.thumb = i;

    const label = document.createElement('span');
    label.className = 'page-label'; label.textContent = `${i + 1}`;

    const check = document.createElement('input');
    check.type = 'checkbox'; check.className = 'page-check';
    check.checked = selectedPages.has(i);
    check.onclick = e => {
      e.stopPropagation();
      check.checked ? selectedPages.add(i) : selectedPages.delete(i);
      item.classList.toggle('selected', check.checked);
    };

    item.appendChild(check); item.appendChild(thumb); item.appendChild(label);
    if (selectedPages.has(i)) item.classList.add('selected');
    item.onclick = () => {
      if (selectMode) {
        check.checked = !check.checked;
        check.checked ? selectedPages.add(i) : selectedPages.delete(i);
        item.classList.toggle('selected', check.checked);
        return;
      }
      S.cur = i; renderPageList(); renderPage(); if (S.panel === 'forms') refreshPanel();
    };

    item.addEventListener('dragstart', e => { dragSrcIdx = i; item.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    item.addEventListener('dragend', () => { item.classList.remove('dragging'); clearAllDragStyles(); });
    item.addEventListener('dragover', e => {
      e.preventDefault();
      if (dragSrcIdx === null || dragSrcIdx === i) return;
      e.dataTransfer.dropEffect = 'move';
      clearAllDragStyles();
      const rect = item.getBoundingClientRect();
      item.classList.add(e.clientY < rect.top + rect.height / 2 ? 'drag-over-top' : 'drag-over-bottom');
    });
    item.addEventListener('dragleave', () => item.classList.remove('drag-over-top', 'drag-over-bottom'));
    item.addEventListener('drop', async e => {
      e.preventDefault(); clearAllDragStyles();
      const targetIdx = i;
      if (dragSrcIdx === null || dragSrcIdx === targetIdx) { dragSrcIdx = null; return; }
      const rect = item.getBoundingClientRect();
      const insertBefore = e.clientY < rect.top + rect.height / 2;
      const to = insertBefore ? targetIdx : targetIdx + 1;     // server clamps to==len -> end
      const src = dragSrcIdx; dragSrcIdx = null;
      try {
        const j = await api('/api/move_page', { from: src, to });
        // recompute current page after the move (afterStructural() clamps it)
        const landed = to > src ? to - 1 : to;
        if (S.cur === src) S.cur = landed;
        else if (src < S.cur && landed >= S.cur) S.cur--;
        else if (src > S.cur && landed <= S.cur) S.cur++;
        afterStructural(j);
      } catch (err) { toast('移動に失敗しました: ' + err.message, 'err'); }
    });
    list.appendChild(item);
  }
}
function clearAllDragStyles() { $$('.page-item').forEach(el => el.classList.remove('drag-over-top', 'drag-over-bottom')); }

// ── Page render with overlay ──
function renderPage() {
  const old = edArea.querySelector('.page-display');
  if (old) old.remove();
  if (S.pages === 0) return;

  const wrap = document.createElement('div'); wrap.className = 'page-display';
  const stage = document.createElement('div'); stage.className = 'page-stage'; stage.id = 'stage';
  const img = document.createElement('img'); img.className = 'page-canvas'; img.id = 'pageImg';
  img.src = `/api/page/${S.cur}?zoom=${S.zoom}&v=${thumbGen}_${thumbRev[S.cur] || 0}`;
  img.ondragstart = () => false;
  const overlay = document.createElementNS(SVGNS, 'svg'); overlay.setAttribute('class', 'overlay'); overlay.id = 'overlay';
  const sizeOverlay = () => {
    if (!img.naturalWidth) return;
    overlay.setAttribute('width', img.naturalWidth);
    overlay.setAttribute('height', img.naturalHeight);
    overlay.setAttribute('viewBox', `0 0 ${img.naturalWidth} ${img.naturalHeight}`);
    drawSearchHits();
  };
  img.addEventListener('load', sizeOverlay);
  // A cached image may already be complete before the listener attaches, so
  // 'load' never fires; size the overlay immediately in that case.
  if (img.complete && img.naturalWidth) sizeOverlay();
  stage.appendChild(img); stage.appendChild(overlay);
  stage.addEventListener('mousedown', onStageMouseDown);
  stage.addEventListener('mousemove', onStageMouseMove);
  stage.addEventListener('dblclick', onStageDblClick);
  wrap.appendChild(stage); edArea.appendChild(wrap);
  applyToolCursor(); updatePageIndicator();
}

// ── Zoom ──
function setZoomLabel() { $('#zoomLbl').textContent = Math.round(S.zoom / 2 * 100) + '%'; }
function zoomIn() { S.zoom = Math.min(8, S.zoom + 0.5); setZoomLabel(); if (S.pages) renderPage(); }
function zoomOut() { S.zoom = Math.max(0.5, S.zoom - 0.5); setZoomLabel(); if (S.pages) renderPage(); }

// ── Undo / Redo ──
async function doUndo() {
  try { const j = await api('/api/undo', {}); if (j.ok === false) return; afterStructural(j); toast('元に戻しました', 'ok'); }
  catch (e) { toast(e.message, 'err'); }
}
async function doRedo() {
  try { const j = await api('/api/redo', {}); if (j.ok === false) return; afterStructural(j); toast('やり直しました', 'ok'); }
  catch (e) { toast(e.message, 'err'); }
}
// structural change: indices/counts may shift -> refresh everything
function afterStructural(j) {
  applyStatus(j);
  S.cur = Math.max(0, Math.min(S.cur, S.pages - 1));
  invalidateAllThumbs(); renderPageList(); renderPage();
  if (S.panel) refreshPanel();
}
// content edit on the current page only: refresh just this page + its thumbnail
function afterContentEdit(j) {
  applyStatus(j); invalidateThumb(S.cur);
  updateThumb(S.cur); renderPage();
}

// ── Text edit (existing PDF text) ──
async function editTextMode() {
  if (S.pages === 0) { toast('PDFを先に開いてください', 'info'); return; }
  try {
    const j = await api(`/api/text/${S.cur}`);
    if (!j.spans || !j.spans.length) {
      toast('このページに編集できる文字がありません（画像/スキャンされたPDFの可能性）', 'info'); return;
    }
    showTextListModal(j.spans);
  } catch (e) { toast(e.message, 'err'); }
}
// Acrobat-style: double-click a piece of text on the page to edit it directly.
async function onStageDblClick(e) {
  if (S.pages === 0 || S.mode) return;   // in a tool mode, dbl-click isn't an edit
  const p = stageCoord(e);
  try {
    const j = await api(`/api/text/${S.cur}`);
    const spans = j.spans || [];
    // hit-test against the display-space bbox (dbox); pick the smallest match.
    let hit = null, best = Infinity;
    for (const sp of spans) {
      const b = sp.dbox || sp.bbox;
      if (p.x >= b[0] && p.x <= b[2] && p.y >= b[1] && p.y <= b[3]) {
        const a = (b[2] - b[0]) * (b[3] - b[1]);
        if (a < best) { best = a; hit = sp; }
      }
    }
    if (!hit) {
      if (!spans.length) toast('このページに編集できる文字がありません（画像/スキャンの可能性）', 'info');
      return;
    }
    showTextEditDialog(hit);
  } catch (err) { toast(err.message, 'err'); }
}
// Click an annotation while the erase tool is active to delete it.
async function eraseAt(p) {
  try {
    const annots = (await api(`/api/annots/${S.cur}`)).annots || [];
    let hit = null, best = Infinity;
    for (const a of annots) {
      const r = a.rect, m = 4;  // tolerance for thin underlines/lines
      if (p.x >= r[0] - m && p.x <= r[2] + m && p.y >= r[1] - m && p.y <= r[3] + m) {
        const area = (r[2] - r[0]) * (r[3] - r[1]);
        if (area < best) { best = area; hit = a; }
      }
    }
    if (!hit) { toast('ここに削除できる注釈はありません', 'info'); return; }
    const res = await api('/api/delete_annot', { page: S.cur, xref: hit.xref });
    afterContentEdit(res); toast(`${hit.type}を削除しました`, 'ok');
  } catch (e) { toast(e.message, 'err'); }
}

const DRAG_TOOLS = ['rect', 'ellipse', 'line', 'highlight', 'underline', 'strikeout', 'arrow'];
const TOOL_LABELS = { addText: 'テキスト追加', addImage: '画像挿入', rect: '四角', ellipse: '楕円', line: '直線', highlight: 'ハイライト', underline: '下線', strikeout: '取り消し線', ink: 'フリーハンド', arrow: '矢印', note: 'コメント' };
const DEFAULT_COLORS = { highlight: '#ffd400', underline: '#e11d48', strikeout: '#e11d48', ink: '#1e293b', arrow: '#e11d48', rect: '#1e293b', ellipse: '#1e293b', line: '#1e293b', note: '#fde047' };

function setTool(tool) {

function clearTool() {

// ── Canvas interactions ──
function stageCoord(e) {
  const img = $('#pageImg'); const r = img.getBoundingClientRect();
  return { x: (e.clientX - r.left) / S.zoom, y: (e.clientY - r.top) / S.zoom };
}
async function onStageMouseDown(e) {
  if (!S.mode) return;
  const p = stageCoord(e);
  if (S.mode === 'erase') { await eraseAt(p); return; }
  if (S.mode === 'addText') { clearTool(); showAddTextDialog(p.x, p.y); return; }
  if (S.mode === 'note') { clearTool(); showNoteDialog(p.x, p.y); return; }
  if (S.mode === 'addImage') {
    if (!S.imgFile) return;
    const fd = new FormData(); fd.append('image', S.imgFile); fd.append('page', S.cur);
    fd.append('x', p.x); fd.append('y', p.y); fd.append('w', 200);
    try { const j = await api('/api/add_image', fd); afterContentEdit(j); toast('画像を挿入しました', 'ok'); }
    catch (err) { toast('画像挿入に失敗: ' + err.message, 'err'); }
    S.imgFile = null; clearTool(); return;
  }
  if (S.mode === 'ink') { S.draw = { points: [[p.x, p.y]] }; return; }
  if (DRAG_TOOLS.includes(S.mode)) { S.draw = { start: p, cur: p }; }
}
function onStageMouseMove(e) {
  if (!S.draw || !S.mode) return;
  const p = stageCoord(e);
  if (S.mode === 'ink') { S.draw.points.push([p.x, p.y]); drawInkPreview(); return; }
  if (DRAG_TOOLS.includes(S.mode)) { S.draw.cur = p; drawShapePreview(); }
}
async function onStageMouseUp(e) {
  if (!S.draw || !S.mode) return;
  const draw = S.draw; S.draw = null; clearPreview();
  if (S.mode === 'ink') {
    if (draw.points.length < 2) return;
    try { const j = await api('/api/annot', { page: S.cur, kind: 'ink', strokes: [draw.points], color: hexToRgb01(S.toolColor), width: S.toolWidth }); afterContentEdit(j); toast('手書きを追加しました', 'ok'); }
    catch (err) { toast(err.message, 'err'); }
    return;
  }
  const s = draw.start, p = stageCoord(e);
  if (Math.abs(p.x - s.x) < 3 && Math.abs(p.y - s.y) < 3) return;
  const box = { x0: Math.min(s.x, p.x), y0: Math.min(s.y, p.y), x1: Math.max(s.x, p.x), y1: Math.max(s.y, p.y) };
  try {
    let j;
    if (['highlight', 'underline', 'strikeout'].includes(S.mode)) {
      j = await api('/api/annot', { page: S.cur, kind: S.mode, ...box, color: hexToRgb01(S.toolColor) });
    } else if (S.mode === 'arrow') {
      j = await api('/api/annot', { page: S.cur, kind: 'arrow', x0: s.x, y0: s.y, x1: p.x, y1: p.y, color: hexToRgb01(S.toolColor), width: S.toolWidth });
    } else if (S.mode === 'line') {
      j = await api('/api/draw_shape', { page: S.cur, type: 'line', x0: s.x, y0: s.y, x1: p.x, y1: p.y, color: hexToRgb01(S.toolColor), width: S.toolWidth });
    } else { // rect, ellipse
      j = await api('/api/draw_shape', { page: S.cur, type: S.mode, ...box, color: hexToRgb01(S.toolColor), width: S.toolWidth, fill: S.toolFill ? hexToRgb01(S.toolColor) : null });
    }
    afterContentEdit(j); toast('追加しました', 'ok');
  } catch (err) { toast('失敗しました: ' + err.message, 'err'); }
}

// ── Preview overlay ──
function clearPreview() { const o = $('#overlay'); if (o) o.querySelectorAll('.prev').forEach(el => el.remove()); }
function svgAdd(name, attrs) {
  const o = $('#overlay'); if (!o) return null;
  const el = document.createElementNS(SVGNS, name);
  for (const k in attrs) el.setAttribute(k, attrs[k]);
  el.classList.add('prev'); o.appendChild(el); return el;
}
function drawShapePreview() {
  clearPreview();
  const z = S.zoom, s = S.draw.start, c = S.draw.cur;
  const col = S.toolColor;
  const x0 = Math.min(s.x, c.x) * z, y0 = Math.min(s.y, c.y) * z, w = Math.abs(c.x - s.x) * z, h = Math.abs(c.y - s.y) * z;
  if (S.mode === 'rect') svgAdd('rect', { x: x0, y: y0, width: w, height: h, fill: S.toolFill ? col : 'none', 'fill-opacity': .3, stroke: col, 'stroke-width': S.toolWidth });
  else if (S.mode === 'ellipse') svgAdd('ellipse', { cx: x0 + w/2, cy: y0 + h/2, rx: w/2, ry: h/2, fill: S.toolFill ? col : 'none', 'fill-opacity': .3, stroke: col, 'stroke-width': S.toolWidth });
  else if (S.mode === 'line' || S.mode === 'arrow') svgAdd('line', { x1: s.x*z, y1: s.y*z, x2: c.x*z, y2: c.y*z, stroke: col, 'stroke-width': S.toolWidth, 'stroke-linecap': 'round' });
  else if (S.mode === 'highlight') svgAdd('rect', { x: x0, y: y0, width: w, height: h, fill: col, 'fill-opacity': .35 });
  else if (S.mode === 'underline') svgAdd('line', { x1: x0, y1: y0 + h, x2: x0 + w, y2: y0 + h, stroke: col, 'stroke-width': 2 });
  else if (S.mode === 'strikeout') svgAdd('line', { x1: x0, y1: y0 + h/2, x2: x0 + w, y2: y0 + h/2, stroke: col, 'stroke-width': 2 });
}
function drawInkPreview() {
  clearPreview();
  const z = S.zoom;
  const pts = S.draw.points.map(p => `${p[0]*z},${p[1]*z}`).join(' ');
  svgAdd('polyline', { points: pts, fill: 'none', stroke: S.toolColor, 'stroke-width': S.toolWidth, 'stroke-linecap': 'round', 'stroke-linejoin': 'round' });
}

// ── Page operations ──
async function addPage() {
  if (S.pages === 0) { toast('PDFを先に開いてください', 'info'); return; }
  try { const j = await api('/api/add_page', {}); S.cur = S.pages; afterStructural(j); toast('ページを追加しました', 'ok'); }
  catch (e) { toast(e.message, 'err'); }
}
async function deletePage() {
  if (S.pages === 0) { toast('PDFを先に開いてください', 'info'); return; }
  if (S.pages <= 1) { toast('最後のページは削除できません', 'err'); return; }
  if (selectMode && selectedPages.size > 0) {
    const pages = [...selectedPages].sort((a, b) => a - b);
    if (pages.length >= S.pages) { toast('すべてのページは削除できません', 'err'); return; }
    confirmDialog(`ページ ${pages.map(p => p + 1).join(', ')} を削除しますか？（${pages.length}ページ）`, async () => {
      try {
        const belowCur = pages.filter(p => p < S.cur).length;
        const j = await api('/api/delete_pages', { pages });
        S.cur -= belowCur;                 // afterStructural() clamps to range
        selectedPages.clear();
        afterStructural(j);
        toast(`${pages.length}ページを削除しました`, 'ok');
      } catch (e) { toast(e.message, 'err'); }
    });
    return;
  }
  confirmDialog(`ページ ${S.cur + 1} を削除しますか？`, async () => {
    try {
      const j = await api('/api/delete_page', { page: S.cur });
      afterStructural(j);                  // applyStatus + clamp S.cur + refresh
      toast('ページを削除しました', 'ok');
    } catch (e) { toast(e.message, 'err'); }
  });
}
async function movePage(dir) {
  if (S.pages <= 1) return;
  const from = S.cur;
  if (dir < 0 && from <= 0) return;
  if (dir > 0 && from >= S.pages - 1) return;
  const to = dir < 0 ? from - 1 : from + 2;  // server clamps; +2 = "after next"
  try {
    const j = await api('/api/move_page', { from, to });
    S.cur = from + dir;                     // afterStructural() clamps to range
    afterStructural(j);
    toast(`ページ ${from + 1} → ${S.cur + 1}`, 'ok');
  } catch (e) { toast('移動に失敗: ' + e.message, 'err'); }
}
async function rotateCurrent() {
  if (S.pages === 0) { toast('PDFを先に開いてください', 'info'); return; }
  const pages = (selectMode && selectedPages.size > 0) ? [...selectedPages] : [S.cur];
  try { const j = await api('/api/rotate', { pages, dir: 1 }); afterStructural(j); toast('回転しました', 'ok'); }

function renderSearchPanel() {

  body.innerHTML = `<div class="rp-search-input"><input type="text" id="searchQ" placeholder="検索語..." value="${escAttr(S.search.q)}"><button id="searchGo">検索</button></div><div class="rp-count" id="searchCount"></div><div id="searchResults"></div>`;
  const input = body.querySelector('#searchQ');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') run(); });

async function doSearch(q) {
  q = (q || '').trim(); S.search.q = q;
  if (!q) { S.search.results = []; S.search.idx = -1; renderSearchResults(); drawSearchHits(); return; }
  try {
    const j = await api(`/api/search?q=${encodeURIComponent(q)}`);
    S.search.results = j.results; S.search.idx = j.results.length ? 0 : -1;
    if (j.results.length) gotoSearchHit(0);
    renderSearchResults(); drawSearchHits();
  } catch (e) { toast(e.message, 'err'); }
}
function renderSearchResults() {
  const cnt = $('#searchCount'), box = $('#searchResults');
  if (!box) return;
  cnt.textContent = S.search.q ? `${S.search.results.length} 件` : '';
  box.innerHTML = '';
  S.search.results.forEach((r, i) => {
    const el = document.createElement('div');
    el.className = 'search-result' + (i === S.search.idx ? ' active' : '');
    el.innerHTML = `<span class="pg">P${r.page + 1}</span><span>位置 ${Math.round(r.rect[1])}</span>`;
    el.onclick = () => { S.search.idx = i; gotoSearchHit(i); renderSearchResults(); };
    box.appendChild(el);
  });
}
function gotoSearchHit(i) {
  const r = S.search.results[i]; if (!r) return;
  if (r.page !== S.cur) { S.cur = r.page; renderPageList(); renderPage(); }
  else drawSearchHits();
}
function drawSearchHits() {
  const o = $('#overlay'); if (!o) return;
  o.querySelectorAll('.search-hit').forEach(el => el.remove());
  if (S.panel !== 'search') return;
  const z = S.zoom;
  S.search.results.forEach((r, i) => {
    if (r.page !== S.cur) return;
    const rc = document.createElementNS(SVGNS, 'rect');
    rc.setAttribute('class', 'search-hit' + (i === S.search.idx ? ' current' : ''));
    rc.setAttribute('x', r.rect[0]*z); rc.setAttribute('y', r.rect[1]*z);
    rc.setAttribute('width', (r.rect[2]-r.rect[0])*z); rc.setAttribute('height', (r.rect[3]-r.rect[1])*z);
    o.appendChild(rc);
  });
}
async function renderFormsPanel() {
  const body = $('#rpBody');
  if (S.pages === 0) { body.innerHTML = `<div class="rp-empty">PDFを開いてください</div>`; return; }
  try {
    const j = await api(`/api/widgets/${S.cur}`);
    if (!j.widgets.length) { body.innerHTML = `<div class="rp-empty">このページにフォームフィールドはありません</div>`; return; }
    body.innerHTML = `<div class="rp-count">${j.widgets.length} フィールド（ページ ${S.cur + 1}）</div>` + j.widgets.map((w, i) => {
      const label = escHtml(w.name || `フィールド ${i + 1}`);
      let ctrl;
      if (w.options) ctrl = `<select data-name="${escAttr(w.name)}">${w.options.map(o => `<option ${o === w.value ? 'selected' : ''}>${escHtml(o)}</option>`).join('')}</select>`;
      else if (w.type && w.type.toLowerCase().includes('checkbox')) ctrl = `<select data-name="${escAttr(w.name)}"><option ${!w.value || w.value === 'Off' ? 'selected' : ''} value="Off">オフ</option><option ${w.value && w.value !== 'Off' ? 'selected' : ''} value="On">オン</option></select>`;
      else ctrl = `<input type="text" data-name="${escAttr(w.name)}" value="${escAttr(w.value || '')}">`;
      return `<div class="form-field"><label>${label}<span class="ftype">${escHtml(w.type || '')}</span></label>${ctrl}</div>`;
    }).join('');
    body.querySelectorAll('[data-name]').forEach(el => {
      el.addEventListener('change', async () => {
        try { const j = await api('/api/set_widget', { page: S.cur, name: el.dataset.name, value: el.value }); afterContentEdit(j); }
        catch (e) { toast(e.message, 'err'); }
      });
    });
  } catch (e) { body.innerHTML = `<div class="rp-empty">${escHtml(e.message)}</div>`; }
}

// ── Generic dialog/confirm helpers ──
function openDialog(innerHtml, onOk, opts = {}) {
  const overlay = document.createElement('div'); overlay.className = 'dialog-overlay';
  overlay.innerHTML = `<div class="dialog">${innerHtml}
    <div class="dialog-actions"><button class="btn-cancel">キャンセル</button><button class="btn-ok">${opts.okLabel || 'OK'}</button></div></div>`;
  document.body.appendChild(overlay);
  const root = overlay.querySelector('.dialog');
  const close = () => overlay.remove();
  const ok = async () => { const keep = await onOk(root); if (keep !== false) close(); };
  overlay.querySelector('.btn-cancel').onclick = close;
  overlay.querySelector('.btn-ok').onclick = ok;
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  root.addEventListener('keydown', e => {
    if (e.key === 'Escape') close();
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); ok(); }
  });
  if (opts.focus) { const f = root.querySelector(opts.focus); if (f) { f.focus(); if (opts.selectAll && f.select) f.select(); } }
}
function confirmDialog(message, onOk) {
  const overlay = document.createElement('div'); overlay.className = 'dialog-overlay';
  overlay.innerHTML = `<div class="dialog"><h3>${escHtml(message)}</h3>
    <div class="dialog-actions"><button class="btn-cancel" id="cfmNo">キャンセル</button><button class="btn-ok" id="cfmYes" style="background:var(--red)">削除</button></div></div>`;
  document.body.appendChild(overlay);
  const close = () => overlay.remove();
  overlay.querySelector('#cfmNo').onclick = close;
  overlay.querySelector('#cfmYes').onclick = () => { close(); onOk(); };
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  overlay.querySelector('.dialog').addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
  overlay.querySelector('#cfmYes').focus();
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  const typing = e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA';
  const mod = e.metaKey || e.ctrlKey;
  if (mod && e.key.toLowerCase() === 's') { e.preventDefault(); save(); return; }
  if (mod && e.key.toLowerCase() === 'f') { e.preventDefault(); if (S.panel !== 'search') togglePanel('search'); else $('#searchQ')?.focus(); return; }
  if (typing) return;
  if (mod && e.key === 'z' && !e.shiftKey) { e.preventDefault(); doUndo(); }
  else if (mod && (e.key === 'y' || (e.shiftKey && e.key.toLowerCase() === 'z'))) { e.preventDefault(); doRedo(); }
  else if (e.key === 'Escape') { clearTool(); }
});

// global mouse-up so a drag that ends outside the canvas still commits (attached once)
window.addEventListener('mouseup', onStageMouseUp);
setZoomLabel();
</script>
